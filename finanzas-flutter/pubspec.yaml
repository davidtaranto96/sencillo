name: sencillo
description: "Sencillo — tu app de finanzas personales: control total + decisiones conscientes + progreso visible"
publish_to: 'none'
version: 1.5.8+10

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Base de datos
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.8
  sqlite3: ^2.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2

  # PDF ingestion
  file_picker: ^8.1.0
  syncfusion_flutter_pdf: ^33.1.46

  # IA + Voz
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  open_filex: ^4.5.0

  # Firebase + Auth
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.6

  # Audio
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_regular.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#261452"
  adaptive_icon_foreground: "assets/ic_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
