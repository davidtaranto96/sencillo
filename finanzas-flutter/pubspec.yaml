name: finanzas_app
description: "App de finanzas personales — control total + decisiones conscientes + progreso visible"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Base de datos
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  sqlite3: ^2.9.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
